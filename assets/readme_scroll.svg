  <circle cx="60" cy="20" r="6" class="dot-green" />

  <text x="400" y="25" text-anchor="middle" class="title">bash - regularDB/README.md</text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#44475a" stroke-width="2" />
  
  <svg x="0" y="40" width="800" height="560">
    <clipPath id="terminal-clip"><rect width="800" height="560" /></clipPath>
    <g clip-path="url(#terminal-clip)">
      <g class="scroll-container">
        <text x="20" y="30" class="terminal" xml:space="preserve">&lt;img width=&quot;676&quot; height=&quot;404&quot; alt=&quot;regularDB&quot; src=&quot;assets/regularDB_animated_pipeline.svg&quot; /&gt;</text>
        <text x="20" y="50" class="terminal" xml:space="preserve"># regularDB</text>
        <text x="20" y="90" class="terminal" xml:space="preserve">&gt; A curated, standardized, and benchmarked compendium of regulatory genomic datasets for Type 2 Diabetes (T2D) research.</text>
        <text x="20" y="130" class="terminal" xml:space="preserve">[![License](https://img.shields.io/badge/license-Apache%202.0-blue.svg)](LICENSE)</text>
        <text x="20" y="150" class="terminal" xml:space="preserve">[![Status](https://img.shields.io/badge/status-active%20development-orange.svg)]()</text>
        <text x="20" y="170" class="terminal" xml:space="preserve">[![Assays](https://img.shields.io/badge/assays-5-green.svg)]()</text>
        <text x="20" y="190" class="terminal" xml:space="preserve">[![Models](https://img.shields.io/badge/LLM%20models-6-purple.svg)]()</text>
        <text x="20" y="230" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="270" class="terminal" xml:space="preserve">## Overview</text>
        <text x="20" y="310" class="terminal" xml:space="preserve">**regularDB** is an R package that systematically curates and provides programmatic access to public regulatory genomics databases relevant to Type 2 Diabetes (T2D). It enables researchers to discover, access, and benchmark epigenomics datasets — removing the barrier between biologists and high-quality regulatory data.</text>
        <text x="20" y="350" class="terminal" xml:space="preserve">The database curation pipeline uses a **multi-LLM benchmarking approach** to systematically identify, validate, and score public databases across five major epigenomics assay types.</text>
        <text x="20" y="390" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="430" class="terminal" xml:space="preserve">## Assay Coverage</text>
        <text x="20" y="470" class="terminal" xml:space="preserve">| Assay | Status | Runs Complete |</text>
        <text x="20" y="490" class="terminal" xml:space="preserve">|---|---|---|</text>
        <text x="20" y="510" class="terminal" xml:space="preserve">| ATAC-seq | In progress | 1 / 3 |</text>
        <text x="20" y="530" class="terminal" xml:space="preserve">| ChIP-seq | Pending | 0 / 3 |</text>
        <text x="20" y="550" class="terminal" xml:space="preserve">| CUT&amp;RUN | Pending | 0 / 3 |</text>
        <text x="20" y="570" class="terminal" xml:space="preserve">| DNA Methylation | Pending | 0 / 3 |</text>
        <text x="20" y="590" class="terminal" xml:space="preserve">| RNA-seq | Pending | 0 / 3 |</text>
        <text x="20" y="630" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="670" class="terminal" xml:space="preserve">## Curation Methodology</text>
        <text x="20" y="710" class="terminal" xml:space="preserve">Database curation follows a three-phase pipeline:</text>
        <text x="20" y="750" class="terminal" xml:space="preserve">**Phase 1 — Systematic Compilation**</text>
        <text x="20" y="770" class="terminal" xml:space="preserve">Six large language models (LLMs) are queried using five standardized prompt strategies to identify candidate databases for each assay type. All models receive identical prompts to ensure comparability.</text>
        <text x="20" y="810" class="terminal" xml:space="preserve">**Phase 2 — Reproducibility &amp; Hallucination Testing**</text>
        <text x="20" y="830" class="terminal" xml:space="preserve">Each prompt is run three times per model at temperature = 0. Databases are scored by consistency across runs:</text>
        <text x="20" y="870" class="terminal" xml:space="preserve">- Appears in 3/3 runs → high confidence</text>
        <text x="20" y="890" class="terminal" xml:space="preserve">- Appears in 2/3 runs → moderate confidence</text>
        <text x="20" y="910" class="terminal" xml:space="preserve">- Appears in 1/3 runs → likely hallucinated</text>
        <text x="20" y="950" class="terminal" xml:space="preserve">**Phase 3 — Manual Validation**</text>
        <text x="20" y="970" class="terminal" xml:space="preserve">Surviving databases are verified for URL validity, data accessibility, metadata quality, and T2D relevance before inclusion in the package.</text>
        <text x="20" y="1010" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1050" class="terminal" xml:space="preserve">## LLM Benchmark Panel</text>
        <text x="20" y="1090" class="terminal" xml:space="preserve">| Model | Developer | Query Method |</text>
        <text x="20" y="1110" class="terminal" xml:space="preserve">|---|---|---|</text>
        <text x="20" y="1130" class="terminal" xml:space="preserve">| Qwen | Alibaba | Manual |</text>
        <text x="20" y="1150" class="terminal" xml:space="preserve">| GLM5 | Zhipu AI | Manual |</text>
        <text x="20" y="1170" class="terminal" xml:space="preserve">| MiniMax-M2.7 | MiniMax | Manual |</text>
        <text x="20" y="1190" class="terminal" xml:space="preserve">| Gemini 3.1 | Google | Manual |</text>
        <text x="20" y="1210" class="terminal" xml:space="preserve">| Claude Opus 4.6 | Anthropic | API |</text>
        <text x="20" y="1230" class="terminal" xml:space="preserve">| GPT-4o | OpenAI | API |</text>
        <text x="20" y="1270" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1310" class="terminal" xml:space="preserve">## Prompt Strategies</text>
        <text x="20" y="1350" class="terminal" xml:space="preserve">Each model is queried using five prompt engineering strategies:</text>
        <text x="20" y="1390" class="terminal" xml:space="preserve">1. **Zero-shot instruction** — direct instruction with output format constraints</text>
        <text x="20" y="1410" class="terminal" xml:space="preserve">2. **Few-shot format control** — example-guided output formatting</text>
        <text x="20" y="1430" class="terminal" xml:space="preserve">3. **Role-based precision boost** — bioinformatics expert persona framing</text>
        <text x="20" y="1450" class="terminal" xml:space="preserve">4. **Guided filtering (chain-of-thought)** — step-by-step reasoning over database properties</text>
        <text x="20" y="1470" class="terminal" xml:space="preserve">5. **Gap detection** — identifying databases absent from a known seed list</text>
        <text x="20" y="1510" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1550" class="terminal" xml:space="preserve">## Repository Structure</text>
        <text x="20" y="1590" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="1610" class="terminal" xml:space="preserve">regularDB/</text>
        <text x="20" y="1630" class="terminal" xml:space="preserve">├── ATACseq_DBs/          # Raw LLM outputs for ATAC-seq (3 runs × 6 models)</text>
        <text x="20" y="1650" class="terminal" xml:space="preserve">├── ChIPseq_DBs/          # Coming soon</text>
        <text x="20" y="1670" class="terminal" xml:space="preserve">├── CUTandRUN_DBs/        # Coming soon</text>
        <text x="20" y="1690" class="terminal" xml:space="preserve">├── DNAmethylation_DBs/   # Coming soon</text>
        <text x="20" y="1710" class="terminal" xml:space="preserve">├── RNAseq_DBs/           # Coming soon</text>
        <text x="20" y="1730" class="terminal" xml:space="preserve">├── LICENSE</text>
        <text x="20" y="1750" class="terminal" xml:space="preserve">└── README.md</text>
        <text x="20" y="1770" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="1810" class="terminal" xml:space="preserve">Each assay folder contains CSV files per model per run, named as:</text>
        <text x="20" y="1850" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="1870" class="terminal" xml:space="preserve">{Model}_{Assay}_Run{N}.csv</text>
        <text x="20" y="1890" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="1930" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1970" class="terminal" xml:space="preserve">## R Package</text>
        <text x="20" y="2010" class="terminal" xml:space="preserve">The regularDB R package (in development) will provide:</text>
        <text x="20" y="2050" class="terminal" xml:space="preserve">- `search_databases()` — query curated databases by assay type, tissue, or disease</text>
        <text x="20" y="2070" class="terminal" xml:space="preserve">- `get_metadata()` — retrieve standardized metadata for any listed database</text>
        <text x="20" y="2090" class="terminal" xml:space="preserve">- `benchmark_db()` — score database quality across QC, accessibility, and annotation metrics</text>
        <text x="20" y="2110" class="terminal" xml:space="preserve">- Direct access wrappers for major databases (GEO, ENCODE, CMDGA, PanKbase, HPAP, etc.)</text>
        <text x="20" y="2150" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="2190" class="terminal" xml:space="preserve">## Citation</text>
        <text x="20" y="2230" class="terminal" xml:space="preserve">If you use regularDB in your research, please cite:</text>
        <text x="20" y="2270" class="terminal" xml:space="preserve">&gt; Bha, H. et al. (2026). regularDB: A curated compendium of regulatory genomic datasets for T2D research. *In preparation.*</text>
        <text x="20" y="2310" class="terminal" xml:space="preserve">---</text>
