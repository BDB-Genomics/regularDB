<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>regularDB curation pipeline</title>
<desc>Three-phase curation pipeline: LLM querying, reproducibility testing, and manual validation leading to the regularDB R package.</desc>

<!-- Background -->
<rect width="680" height="340" fill="#0d1117"/>

<!-- Title -->
<text x="340" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">regularDB curation pipeline</text>

<!-- ── Phase 1 box ── -->
<g>
  <rect x="40" y="40" width="160" height="52" rx="8" fill="#26215C" stroke="#534AB7" stroke-width="0.5">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.1s" fill="freeze"/>
  </rect>
  <text x="120" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#CECBF6" opacity="0">
    Phase 1
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.1s" fill="freeze"/>
  </text>
  <text x="120" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#AFA9EC" opacity="0">
    LLM querying
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.1s" fill="freeze"/>
  </text>
</g>

<!-- 6 model dots -->
<text x="120" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" opacity="0">
  6 models · 5 prompts
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
</text>
<circle cx="68"  cy="135" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/></circle>
<circle cx="88"  cy="135" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/></circle>
<circle cx="108" cy="135" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/></circle>
<circle cx="128" cy="135" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/></circle>
<circle cx="148" cy="135" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/></circle>
<circle cx="168" cy="135" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.0s" fill="freeze"/></circle>

<!-- Arrow 1→2 animated draw -->
<line x1="202" y1="66" x2="238" y2="66" stroke="#555" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="40" stroke-dashoffset="40">
  <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.4s" begin="1.1s" fill="freeze"/>
</line>

<!-- ── Phase 2 box ── -->
<rect x="240" y="40" width="160" height="52" rx="8" fill="#04342C" stroke="#0F6E56" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
</rect>
<text x="320" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#9FE1CB" opacity="0">
  Phase 2
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
</text>
<text x="320" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5DCAA5" opacity="0">
  Reproducibility × 3
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
</text>

<!-- Run badges -->
<text x="320" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" opacity="0">
  temperature = 0
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
</text>

<!-- R1 done -->
<rect x="272" y="124" width="36" height="20" rx="10" fill="#085041" stroke="#5DCAA5" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
</rect>
<text x="290" y="137" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#9FE1CB" opacity="0">
  R1 ✓
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
</text>

<!-- R2 pending pulse -->
<rect x="302" y="124" width="36" height="20" rx="10" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="2.2s" repeatCount="indefinite"/>
</rect>
<text x="320" y="137" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#5DCAA5" opacity="0">
  R2
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
</text>

<!-- R3 pending pulse -->
<rect x="332" y="124" width="36" height="20" rx="10" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="2.6s" repeatCount="indefinite"/>
</rect>
<text x="350" y="137" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#5DCAA5" opacity="0">
  R3
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
</text>

<!-- Arrow 2→3 -->
<line x1="402" y1="66" x2="438" y2="66" stroke="#555" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="40" stroke-dashoffset="40">
  <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.4s" begin="1.9s" fill="freeze"/>
</line>

<!-- ── Phase 3 box ── -->
<rect x="440" y="40" width="160" height="52" rx="8" fill="#412402" stroke="#854F0B" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
</rect>
<text x="520" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#FAC775" opacity="0">
  Phase 3
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
</text>
<text x="520" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#EF9F27" opacity="0">
  Manual validation
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
</text>

<!-- Validation checks appear one by one -->
<text x="456" y="115" font-family="system-ui,sans-serif" font-size="10" fill="#EF9F27" opacity="0">✓ URL live
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.3s" fill="freeze"/>
</text>
<text x="456" y="130" font-family="system-ui,sans-serif" font-size="10" fill="#EF9F27" opacity="0">✓ T2D evidence
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.6s" fill="freeze"/>
</text>
<text x="456" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#EF9F27" opacity="0">✓ API accessible
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.9s" fill="freeze"/>
</text>

<!-- Down arrow -->
<line x1="340" y1="96" x2="340" y2="192" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)" stroke-dashoffset="100" stroke-dasharray="4 3 100">
  <animate attributeName="opacity" from="0" to="0.6" dur="0.4s" begin="3.1s" fill="freeze"/>
</line>
<text x="350" y="152" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" opacity="0">
  curated list
  <animate attributeName="opacity" from="0" to="0.6" dur="0.4s" begin="3.2s" fill="freeze"/>
</text>

<!-- ── R package box ── -->
<rect x="240" y="195" width="200" height="52" rx="8" fill="#042C53" stroke="#185FA5" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.3s" fill="freeze"/>
</rect>
<text x="340" y="217" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#B5D4F4" opacity="0">
  regularDB
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.3s" fill="freeze"/>
</text>
<text x="340" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#85B7EB" opacity="0">
  R package
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.3s" fill="freeze"/>
</text>

<!-- Spinning orbit ring -->
<circle cx="340" cy="221" r="32" fill="none" stroke="#378ADD" stroke-width="0.5" stroke-dasharray="3 4" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.5s" fill="freeze"/>
  <animateTransform attributeName="transform" type="rotate" from="0 340 221" to="360 340 221" dur="8s" begin="3.5s" repeatCount="indefinite"/>
</circle>

<!-- ── Assay badges ── -->
<text x="340" y="272" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" opacity="0">
  5 assay types
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.7s" fill="freeze"/>
</text>

<rect x="62"  y="280" width="72" height="18" rx="9" fill="#26215C" stroke="#534AB7" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.8s" fill="freeze"/></rect>
<text x="98"  y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#CECBF6" opacity="0">ATAC-seq<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.8s" fill="freeze"/></text>

<rect x="142" y="280" width="68" height="18" rx="9" fill="#04342C" stroke="#0F6E56" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.95s" fill="freeze"/></rect>
<text x="176" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#9FE1CB" opacity="0">ChIP-seq<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.95s" fill="freeze"/></text>

<rect x="218" y="280" width="72" height="18" rx="9" fill="#412402" stroke="#854F0B" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.1s" fill="freeze"/></rect>
<text x="254" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#FAC775" opacity="0">CUT&amp;RUN<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.1s" fill="freeze"/></text>

<rect x="298" y="280" width="88" height="18" rx="9" fill="#4A1B0C" stroke="#993C1D" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.25s" fill="freeze"/></rect>
<text x="342" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#F5C4B3" opacity="0">DNA methyl.<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.25s" fill="freeze"/></text>

<rect x="394" y="280" width="66" height="18" rx="9" fill="#042C53" stroke="#185FA5" stroke-width="0.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.4s" fill="freeze"/></rect>
<text x="427" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#B5D4F4" opacity="0">RNA-seq<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.4s" fill="freeze"/></text>

<!-- in progress badge pulsing -->
<rect x="468" y="280" width="82" height="18" rx="9" fill="#412402" stroke="#854F0B" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.55s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" begin="5s" repeatCount="indefinite"/>
</rect>
<text x="509" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#EF9F27" opacity="0">
  in progress
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.55s" fill="freeze"/>
</text>

<!-- bottom line + credit -->
<line x1="40" y1="315" x2="640" y2="315" stroke="#30363d" stroke-width="0.5"/>
<text x="340" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#484f58">github.com/BDB-Genomics/regularDB</text>

<!-- Arrow marker def -->
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

</svg>
