<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#888">regularDB curation pipeline</text>

<!-- Phase 1 -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
  <rect x="40" y="35" width="160" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="120" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#3C3489">Phase 1</text>
  <text x="120" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">LLM querying</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.7s" fill="freeze"/>
  <text x="120" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">6 models · 5 prompts</text>
  <circle cx="68"  cy="126" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="88"  cy="126" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="108" cy="126" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="128" cy="126" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="148" cy="126" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <circle cx="168" cy="126" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
</g>

<!-- Arrow 1→2 -->
<line x1="202" y1="61" x2="238" y2="61" stroke="#aaa" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="40" stroke-dashoffset="40">
  <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.4s" begin="1.0s" fill="freeze"/>
</line>

<!-- Phase 2 -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
  <rect x="240" y="35" width="160" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="320" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#085041">Phase 2</text>
  <text x="320" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0F6E56">Reproducibility x3</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze"/>
  <text x="320" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">temperature = 0</text>
  <rect x="272" y="116" width="36" height="20" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="290" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#085041">R1 v</text>
</g>

<rect x="302" y="116" width="36" height="20" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="2.2s" repeatCount="indefinite"/>
</rect>
<text x="320" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#0F6E56" opacity="0">
  R2
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
</text>

<rect x="332" y="116" width="36" height="20" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.9s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="2.6s" repeatCount="indefinite"/>
</rect>
<text x="350" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#0F6E56" opacity="0">
  R3
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.9s" fill="freeze"/>
</text>

<!-- Arrow 2→3 -->
<line x1="402" y1="61" x2="438" y2="61" stroke="#aaa" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="40" stroke-dashoffset="40">
  <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.4s" begin="2.0s" fill="freeze"/>
</line>

<!-- Phase 3 -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.1s" fill="freeze"/>
  <rect x="440" y="35" width="160" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="520" y="57" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#633806">Phase 3</text>
  <text x="520" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#854F0B">Manual validation</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.4s" fill="freeze"/>
  <text x="456" y="108" font-family="system-ui,sans-serif" font-size="10" fill="#854F0B">v URL live</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.7s" fill="freeze"/>
  <text x="456" y="122" font-family="system-ui,sans-serif" font-size="10" fill="#854F0B">v T2D evidence</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.0s" fill="freeze"/>
  <text x="456" y="136" font-family="system-ui,sans-serif" font-size="10" fill="#854F0B">v API accessible</text>
</g>

<!-- Down arrow -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="3.2s" fill="freeze"/>
  <line x1="340" y1="90" x2="340" y2="185" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="350" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#888">curated list</text>
</g>

<!-- R package -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.4s" fill="freeze"/>
  <rect x="240" y="188" width="200" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0C447C">regularDB</text>
  <text x="340" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#185FA5">R package</text>
</g>

<!-- Spinning ring -->
<circle cx="340" cy="214" r="34" fill="none" stroke="#85B7EB" stroke-width="0.8" stroke-dasharray="3 5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.8s" fill="freeze"/>
  <animateTransform attributeName="transform" type="rotate" from="0 340 214" to="360 340 214" dur="7s" begin="3.8s" repeatCount="indefinite"/>
</circle>

<!-- Assay badges -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.9s" fill="freeze"/>
  <text x="340" y="264" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">5 assay types</text>
  <rect x="44"  y="272" width="76" height="18" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="82"  y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#3C3489">ATAC-seq</text>
  <rect x="128" y="272" width="70" height="18" rx="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="163" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#085041">ChIP-seq</text>
  <rect x="206" y="272" width="74" height="18" rx="9" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="243" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#633806">CUT&amp;RUN</text>
  <rect x="288" y="272" width="90" height="18" rx="9" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="333" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#712B13">DNA methyl.</text>
  <rect x="386" y="272" width="68" height="18" rx="9" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="420" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#0C447C">RNA-seq</text>
</g>

<rect x="462" y="272" width="84" height="18" rx="9" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.2s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="4.5s" repeatCount="indefinite"/>
</rect>
<text x="504" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#633806" opacity="0">
  in progress
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.2s" fill="freeze"/>
</text>

<line x1="40" y1="308" x2="640" y2="308" stroke="#ddd" stroke-width="0.5"/>
<text x="340" y="323" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#aaa">github.com/BDB-Genomics/regularDB</text>

</svg>
