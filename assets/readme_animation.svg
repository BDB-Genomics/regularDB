<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <style>
    .terminal { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 15px; fill: #A9DC76; }
    .header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; fill: #f8f8f2; font-weight: 600; }
    .bg { fill: #1E1E1E; rx: 12px; }
    .topbar { fill: #2D2D2D; rx: 12px; }
    
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
  </style>
  
  <rect class="bg" width="100%" height="100%" />
  
  <svg x="0" y="40" width="900" height="560">
    <clipPath id="terminal-clip"><rect width="880" height="560" x="10" y="0"/></clipPath>
    <g clip-path="url(#terminal-clip)">
      <g>
        <!-- SMIL Animation for GitHub Camo Support! -->
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          from="0,560" 
          to="0,-3220" 
          dur="104s" 
          repeatCount="indefinite" />
        <text x="20" y="20" style="fill: #A9DC76;" class="terminal" xml:space="preserve">&lt;img width=&quot;676&quot; height=&quot;404&quot; alt=&quot;regularDB&quot; src=&quot;https://github.com/user-attachments/assets/162f9807-6733-4436-a886-c1242429eed0&quot; /&gt;</text>
        <text x="20" y="68" style="fill: #A9DC76;" class="terminal" xml:space="preserve">&lt;img width=&quot;676&quot; height=&quot;404&quot; alt=&quot;regularDB&quot; src=&quot;assets/regularDB_animated_pipeline.svg&quot; /&gt;</text>
        <text x="20" y="92" style="fill: #FC9867;" class="terminal" xml:space="preserve"># regularDB</text>
        <text x="20" y="140" style="fill: #A9DC76;" class="terminal" xml:space="preserve">&lt;p align=&quot;center&quot;&gt;</text>
        <text x="20" y="164" style="fill: #A9DC76;" class="terminal" xml:space="preserve">  &lt;img src=&quot;assets/readme_animation.svg&quot; alt=&quot;Animated README Terminal&quot; width=&quot;900&quot; /&gt;</text>
        <text x="20" y="188" style="fill: #A9DC76;" class="terminal" xml:space="preserve">&lt;/p&gt;</text>
        <text x="20" y="212" style="fill: #AB9DF2;" class="terminal" xml:space="preserve">&gt; A curated, standardized, and benchmarked compendium of regulatory genomic datasets for Type 2 Diabetes (T2D) research.</text>
        <text x="20" y="260" style="fill: #A9DC76;" class="terminal" xml:space="preserve">[![License](https://img.shields.io/badge/license-Apache%202.0-blue.svg)](LICENSE)</text>
        <text x="20" y="284" style="fill: #A9DC76;" class="terminal" xml:space="preserve">[![Status](https://img.shields.io/badge/status-active%20development-orange.svg)]()</text>
        <text x="20" y="308" style="fill: #A9DC76;" class="terminal" xml:space="preserve">[![Assays](https://img.shields.io/badge/assays-5-green.svg)]()</text>
        <text x="20" y="332" style="fill: #A9DC76;" class="terminal" xml:space="preserve">[![Models](https://img.shields.io/badge/LLM%20models-6-purple.svg)]()</text>
        <text x="20" y="380" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="428" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Overview</text>
        <text x="20" y="476" style="fill: #78DCE8;" class="terminal" xml:space="preserve">**regularDB** is an R package that systematically curates and provides programmatic access to public regulatory genomics databases relevant to Type 2 Diabetes (T2D). It enables researchers to discover, access, and benchmark epigenomics datasets — removing the barrier between biologists and high-quality regulatory data.</text>
        <text x="20" y="524" style="fill: #A9DC76;" class="terminal" xml:space="preserve">The database curation pipeline uses a **multi-LLM benchmarking approach** to systematically identify, validate, and score public databases across five major epigenomics assay types.</text>
        <text x="20" y="572" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="620" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Assay Coverage</text>
        <text x="20" y="668" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| Assay | Status | Runs Complete |</text>
        <text x="20" y="692" style="fill: #A9DC76;" class="terminal" xml:space="preserve">|---|---|---|</text>
        <text x="20" y="716" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| ATAC-seq | In progress | 1 / 3 |</text>
        <text x="20" y="740" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| ChIP-seq | Pending | 0 / 3 |</text>
        <text x="20" y="764" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| CUT&amp;RUN | Pending | 0 / 3 |</text>
        <text x="20" y="788" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| DNA Methylation | Pending | 0 / 3 |</text>
        <text x="20" y="812" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| RNA-seq | Pending | 0 / 3 |</text>
        <text x="20" y="860" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="908" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Curation Methodology</text>
        <text x="20" y="956" style="fill: #A9DC76;" class="terminal" xml:space="preserve">Database curation follows a three-phase pipeline:</text>
        <text x="20" y="1004" style="fill: #78DCE8;" class="terminal" xml:space="preserve">**Phase 1 — Systematic Compilation**</text>
        <text x="20" y="1028" style="fill: #A9DC76;" class="terminal" xml:space="preserve">Six large language models (LLMs) are queried using five standardized prompt strategies to identify candidate databases for each assay type. All models receive identical prompts to ensure comparability.</text>
        <text x="20" y="1076" style="fill: #78DCE8;" class="terminal" xml:space="preserve">**Phase 2 — Reproducibility &amp; Hallucination Testing**</text>
        <text x="20" y="1100" style="fill: #A9DC76;" class="terminal" xml:space="preserve">Each prompt is run three times per model at temperature = 0. Databases are scored by consistency across runs:</text>
        <text x="20" y="1148" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- Appears in 3/3 runs → high confidence</text>
        <text x="20" y="1172" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- Appears in 2/3 runs → moderate confidence</text>
        <text x="20" y="1196" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- Appears in 1/3 runs → likely hallucinated</text>
        <text x="20" y="1244" style="fill: #78DCE8;" class="terminal" xml:space="preserve">**Phase 3 — Manual Validation**</text>
        <text x="20" y="1268" style="fill: #A9DC76;" class="terminal" xml:space="preserve">Surviving databases are verified for URL validity, data accessibility, metadata quality, and T2D relevance before inclusion in the package.</text>
        <text x="20" y="1316" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1364" style="fill: #FC9867;" class="terminal" xml:space="preserve">## LLM Benchmark Panel</text>
        <text x="20" y="1412" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| Model | Developer | Query Method |</text>
        <text x="20" y="1436" style="fill: #A9DC76;" class="terminal" xml:space="preserve">|---|---|---|</text>
        <text x="20" y="1460" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| Qwen | Alibaba | Manual |</text>
        <text x="20" y="1484" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| GLM5 | Zhipu AI | Manual |</text>
        <text x="20" y="1508" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| MiniMax-M2.7 | MiniMax | Manual |</text>
        <text x="20" y="1532" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| Gemini 3.1 | Google | Manual |</text>
        <text x="20" y="1556" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| Claude Opus 4.6 | Anthropic | API |</text>
        <text x="20" y="1580" style="fill: #A9DC76;" class="terminal" xml:space="preserve">| GPT-4o | OpenAI | API |</text>
        <text x="20" y="1628" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1676" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Prompt Strategies</text>
        <text x="20" y="1724" style="fill: #A9DC76;" class="terminal" xml:space="preserve">Each model is queried using five prompt engineering strategies:</text>
        <text x="20" y="1772" style="fill: #A9DC76;" class="terminal" xml:space="preserve">1. **Zero-shot instruction** — direct instruction with output format constraints</text>
        <text x="20" y="1796" style="fill: #A9DC76;" class="terminal" xml:space="preserve">2. **Few-shot format control** — example-guided output formatting</text>
        <text x="20" y="1820" style="fill: #A9DC76;" class="terminal" xml:space="preserve">3. **Role-based precision boost** — bioinformatics expert persona framing</text>
        <text x="20" y="1844" style="fill: #A9DC76;" class="terminal" xml:space="preserve">4. **Guided filtering (chain-of-thought)** — step-by-step reasoning over database properties</text>
        <text x="20" y="1868" style="fill: #A9DC76;" class="terminal" xml:space="preserve">5. **Gap detection** — identifying databases absent from a known seed list</text>
        <text x="20" y="1916" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="1964" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Repository Structure</text>
        <text x="20" y="2012" style="fill: #A9DC76;" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="2036" style="fill: #A9DC76;" class="terminal" xml:space="preserve">regularDB/</text>
        <text x="20" y="2060" style="fill: #A9DC76;" class="terminal" xml:space="preserve">├── ATACseq_DBs/          # Raw LLM outputs for ATAC-seq (3 runs × 6 models)</text>
        <text x="20" y="2084" style="fill: #A9DC76;" class="terminal" xml:space="preserve">├── ChIPseq_DBs/          # Coming soon</text>
        <text x="20" y="2108" style="fill: #A9DC76;" class="terminal" xml:space="preserve">├── CUTandRUN_DBs/        # Coming soon</text>
        <text x="20" y="2132" style="fill: #A9DC76;" class="terminal" xml:space="preserve">├── DNAmethylation_DBs/   # Coming soon</text>
        <text x="20" y="2156" style="fill: #A9DC76;" class="terminal" xml:space="preserve">├── RNAseq_DBs/           # Coming soon</text>
        <text x="20" y="2180" style="fill: #A9DC76;" class="terminal" xml:space="preserve">├── LICENSE</text>
        <text x="20" y="2204" style="fill: #A9DC76;" class="terminal" xml:space="preserve">└── README.md</text>
        <text x="20" y="2228" style="fill: #A9DC76;" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="2276" style="fill: #A9DC76;" class="terminal" xml:space="preserve">Each assay folder contains CSV files per model per run, named as:</text>
        <text x="20" y="2324" style="fill: #A9DC76;" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="2348" style="fill: #A9DC76;" class="terminal" xml:space="preserve">{Model}_{Assay}_Run{N}.csv</text>
        <text x="20" y="2372" style="fill: #A9DC76;" class="terminal" xml:space="preserve">```</text>
        <text x="20" y="2420" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="2468" style="fill: #FC9867;" class="terminal" xml:space="preserve">## R Package</text>
        <text x="20" y="2516" style="fill: #A9DC76;" class="terminal" xml:space="preserve">The regularDB R package (in development) will provide:</text>
        <text x="20" y="2564" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- `search_databases()` — query curated databases by assay type, tissue, or disease</text>
        <text x="20" y="2588" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- `get_metadata()` — retrieve standardized metadata for any listed database</text>
        <text x="20" y="2612" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- `benchmark_db()` — score database quality across QC, accessibility, and annotation metrics</text>
        <text x="20" y="2636" style="fill: #78DCE8;" class="terminal" xml:space="preserve">- Direct access wrappers for major databases (GEO, ENCODE, CMDGA, PanKbase, HPAP, etc.)</text>
        <text x="20" y="2684" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="2732" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Citation</text>
        <text x="20" y="2780" style="fill: #A9DC76;" class="terminal" xml:space="preserve">If you use regularDB in your research, please cite:</text>
        <text x="20" y="2828" style="fill: #AB9DF2;" class="terminal" xml:space="preserve">&gt; Bha, H. et al. (2026). regularDB: A curated compendium of regulatory genomic datasets for T2D research. *In preparation.*</text>
        <text x="20" y="2876" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="2924" style="fill: #FC9867;" class="terminal" xml:space="preserve">## License</text>
        <text x="20" y="2972" style="fill: #A9DC76;" class="terminal" xml:space="preserve">This project is licensed under the [Apache License 2.0](LICENSE).</text>
        <text x="20" y="3020" style="fill: #78DCE8;" class="terminal" xml:space="preserve">---</text>
        <text x="20" y="3068" style="fill: #FC9867;" class="terminal" xml:space="preserve">## Contact</text>
        <text x="20" y="3116" style="fill: #78DCE8;" class="terminal" xml:space="preserve">**BDB-Genomics** · [GitHub](https://github.com/BDB-Genomics)</text>

      </g>
    </g>
  </svg>
  
